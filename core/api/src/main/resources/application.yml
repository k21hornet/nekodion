spring:
  application:
    name: nekodion-api
  jpa:
    hibernate:
      ddl-auto: none
  datasource:
    url: jdbc:mysql://localhost:3368/${DB_NAME}?serverTimezone=Asia/Tokyo
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
auth0:
  issuer: ${ISSUER}
  audience: ${AUDIENCE}
